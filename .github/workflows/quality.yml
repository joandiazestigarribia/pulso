name: Quality

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    name: Typecheck, lint, build and test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: pulso_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d pulso_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/pulso_test?schema=public
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/pulso_test?schema=public
      JWT_SECRET: ci-only-jwt-secret-change-in-real-environments
      ADMIN_API_TOKEN: ci-only-admin-token
      ALLOWED_ORIGINS: http://localhost:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Apply test database migrations
        run: npx prisma migrate deploy

      - name: Test
        run: npm run test
